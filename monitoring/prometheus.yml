global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Auto-monitoring de Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend Flask
  - job_name: 'backend'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:5000']

  # Ollama (⚠️ Voir note technique ci-dessous)
  - job_name: 'ollama'
    scrape_interval: 30s
    static_configs:
      - targets: ['ollama:11434']