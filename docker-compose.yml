# ============================================================
# PLATEFORME SOC IA HYBRIDE - Docker Compose
# Projet PFE - Tunisie Telecom / ESPRIT
# Auteur: Firas KerKENI
# ============================================================

services:
  # ============================================================
  # INFRASTRUCTURE CLOUD (Nginx Reverse Proxy)
  # ============================================================
  
  cloud-service:
    image: nginx:alpine
    container_name: cloud-service
    ports:
      - "8082:80"
    networks:
      - hybrid-network
    volumes:
      - ./logs/cloud:/var/log/nginx
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ============================================================
  # INFRASTRUCTURE ON-PREMISE (PostgreSQL)
  # ============================================================
  
  on-premise-server:
    image: postgres:15-alpine
    container_name: on-premise-db
    ports:
      - "5432:5432"
    networks:
      - hybrid-network
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: SecurePass2026
      POSTGRES_DB: company_data
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./logs/on-premise:/var/log/postgresql
      - ./config/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ============================================================
  # BACKEND - Flask + CrewAI + Ollama (CŒUR IA)
  # ============================================================
  
  backend:
    build:
      context: ./backend          # ✅ Contexte = dossier backend
      dockerfile: Dockerfile
    container_name: backend-service
    ports:
      - "5000:5000"
    networks:
      - hybrid-network
    environment:
      FLASK_ENV: development
      FLASK_APP: app.py
      OPENAI_API_KEY: ollama
      OPENAI_API_BASE: http://ollama:11434/v1
      DATABASE_URL: postgresql://admin:SecurePass2026@on-premise-server:5432/company_data
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend:/app
      - ./logs/backend:/app/logs
      - ./backend/blockchain_logs:/app/blockchain_logs
    depends_on:
      ollama:
        condition: service_started
      on-premise-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5000/api/health || exit 1"]  # ✅ Espace après -q
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 240s  # ✅ Temps pour charger Mistral + init Flask
    command: python app.py
    restart: unless-stopped

  # ============================================================
  # FRONTEND - React + Vite
  # ============================================================
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-service
    ports:
      - "5173:5173"
    networks:
      - hybrid-network
    environment:
      VITE_API_URL: http://backend:5000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5173/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ============================================================
  # LLM - Ollama (Inférence Locale Mistral:latest)
  # ============================================================
  
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "11434:11434"
    networks:
      - hybrid-network
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_ORIGINS: "*"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 12
      start_period: 300s  # ✅ Temps pour télécharger/charger mistral:latest
    command: serve
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: 8G
          cpus: '4'

  # ============================================================
  # CACHE & SESSIONS - Redis
  # ============================================================
  
  redis:
    image: redis:7-alpine
    container_name: redis-service
    ports:
      - "6379:6379"
    networks:
      - hybrid-network
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================================
  # LOG COLLECTION - Fluentd
  # ============================================================
  
  fluentd:
    build:
      context: ./fluentd
      dockerfile: Dockerfile
    container_name: fluentd-service
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    networks:
      - hybrid-network
    volumes:
      - ./fluentd/fluent.conf:/fluentd/etc/fluent.conf:ro
      - ./logs/fluentd:/fluentd/log
      - ./logs/aggregated:/fluentd/aggregated
    depends_on:
      - cloud-service
      - on-premise-server
    environment:
      FLUENT_LOG_LEVEL: info
    restart: unless-stopped

  # ============================================================
  # MONITORING - Prometheus
  # ============================================================
  
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-service
    ports:
      - "9090:9090"
    networks:
      - hybrid-network
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy", "||", "exit", "1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================================
  # VISUALIZATION - Grafana
  # ============================================================
  
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-service
    ports:
      - "3000:3000"
    networks:
      - hybrid-network
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin2026
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================================
  # LOG GENERATION (Pour tests & démo)
  # ============================================================
  
  log-generator:
    build:
      context: ./log-generator
      dockerfile: Dockerfile
    container_name: log-generator-service
    networks:
      - hybrid-network
    volumes:
      - ./logs/generated:/app/logs
    depends_on:
      - cloud-service
      - on-premise-server
    environment:
      LOG_DIR: /app/logs
      GENERATION_INTERVAL: 30
    restart: on-failure

  # ============================================================
  # ATTACK SIMULATOR (Pour tests de détection)
  # ============================================================
  
  attacker-simulator:
    build:
      context: ./attack-scripts
      dockerfile: Dockerfile
    container_name: attacker-sim-service
    networks:
      - hybrid-network
    volumes:
      - ./attack-scripts:/app
      - ./logs/attacks:/app/logs
    depends_on:
      - cloud-service
      - on-premise-server
      - backend
    environment:
      CLOUD_TARGET: http://cloud-service
      BACKEND_TARGET: http://backend:5000
      ATTACK_INTERVAL: 300  # Une attaque toutes les 5 min
    restart: on-failure

  # ============================================================
  # BLOCKCHAIN SIMULATOR (Preuve immuable incidents CRITICAL)
  # ============================================================
  
  blockchain-sim:
    build:
      context: ./blockchain-sim
      dockerfile: Dockerfile
    container_name: blockchain-simulator
    ports:
      - "6001:6001"
    networks:
      - hybrid-network
    volumes:
      - blockchain-data:/app/data
    restart: unless-stopped

# ============================================================
# RÉSEAU & VOLUMES
# ============================================================

networks:
  hybrid-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres-data:
    driver: local
  ollama-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  redis-data:
    driver: local
  blockchain-data:
    driver: local